<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שלב 2: תרגול שאלות פתוחות</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Specific styles for Open Questions area */
    #openQuestionArea {
      margin-top: 10px;
    }
    textarea {
      width: 100%;
      border-radius: 12px;
      padding: 12px;
      font-size: 16px;
      font-family: inherit;
      border: 2px solid #cbd5e1;
      resize: vertical;
    }
    .ideal-answer-box {
      margin-top: 16px;
      background: #dcfce7;
      padding: 16px;
      border-radius: 12px;
      border: 1px solid #22c55e;
    }
    .ideal-title {
      font-weight: bold;
      color: #166534;
      margin-bottom: 8px;
    }
    .ideal-text {
      white-space: pre-wrap;
      color: #14532d;
      font-size: 15px;
      line-height: 1.5;
    }
    .grade-title {
      margin-top: 16px;
      text-align: center;
      font-weight: bold;
      color: #1e1b4b;
    }
    .grade-buttons {
      display: flex;
      gap: 10px;
      margin-top: 8px;
    }
    .grade-btn {
      flex: 1;
      color: #fff;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      font-size: 15px;
      transition: 0.2s;
    }
    .grade-correct { background: #22c55e; }
    .grade-wrong { background: #ef4444; }
  </style>
</head>
<body>

  <div class="container">
    <div class="topbar" style="margin-bottom: 20px;">
      <a href="index.html" class="icon-btn" style="background:#f1f5f9; font-weight:bold;">🏠 חזור למסך הראשי</a>
      <button class="icon-btn" onclick="toggleMute()" id="muteBtn" title="השתקת סאונד">🔊</button>
      <button class="icon-btn" onclick="openStats()" title="סטטיסטיקה">📊 סטטיסטיקה</button>
    </div>

    <h1>שלב 2: שאלות פתוחות</h1>

    <div class="topbar">
      <div class="pill gray">תרגול שאלות פתוחות</div>
      <div class="pill">נכון: <span id="correct">0</span></div>
      <div class="pill" style="background:#fee2e2;color:#991b1b;">שגוי: <span id="wrong">0</span></div>
      <div class="pill gray">שאלה <span id="qnum">1</span> / <span id="qtotal">0</span></div>
    </div>

    <div class="progress">
      <div class="progress-inner" id="progressBar"></div>
    </div>

    <div id="questionArea">
      <div class="topic-subtitle" id="topicSubtitle">נושא</div>
      <div id="questionText">חילץ נתונים...</div>

      <div id="openQuestionArea">
        <textarea id="openAnswerInput" rows="5" placeholder="הקלד/י את תשובתך המלאה כאן..."></textarea>
        <button id="showAnswerBtn" class="primary" style="width:100%; padding:14px; margin-top:12px; border-radius:12px; font-size:16px; border:none; cursor:pointer;" onclick="showOpenAnswer()">הצג תשובה אידיאלית לבדיקה</button>
        
        <div id="idealAnswerBox" class="ideal-answer-box" style="display:none;">
          <div class="ideal-title">תשובה מעולה:</div>
          <div id="idealAnswerText" class="ideal-text"></div>
          
          <div class="grade-title">האם ענית נכון בהשוואה לתשובה?</div>
          <div class="grade-buttons">
            <button onclick="gradeOpenAnswer(true)" class="grade-btn grade-correct">✓ עניתי קרוב מאוד</button>
            <button onclick="gradeOpenAnswer(false)" class="grade-btn grade-wrong">✗ לא מספיק מדויק</button>
          </div>
        </div>
      </div>
      
      <!-- Finish message box -->
      <div id="finishBox" style="display:none; text-align:center; padding: 20px;">
        <h2 style="color:#16a34a;">סיום תרגול 🎉</h2>
        <div id="finishStats" class="small" style="font-size:18px;"></div>
        <a href="index.html" class="primary" style="display:inline-block; padding:10px 20px; border-radius:8px; text-decoration:none; margin-top:15px;">חזור למסך הראשי</a>
      </div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal">
    <div class="modal">
      <button class="close-modal" aria-label="סגור" onclick="closeModal('statsModal')">&times;</button>
      <h2>סטטיסטיקת המשתמש</h2>
      <div id="statsContent"></div>
      <div style="margin-top: 20px; text-align:center;">
        <button class="primary" style="padding: 10px 20px; border-radius: 8px; border: none; cursor:pointer;"
          onclick="closeModal('statsModal')">סגור</button>
      </div>
    </div>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
  <script>
    var currentOpenQ = null;
    var list = [];
    var idx = 0;
    var correct = 0;
    var wrong = 0;

    function initPage() {
      // Double check if user has access (3 exams passed)
      if (civics_stats.examsPassed < 3) {
        alert("שלב 2 חסום! עליך קודם להשלים לפחות 3 מבחני שלב 4 בהצלחה מתוך מסך הבית.");
        window.location.href = "index.html";
        return;
      }
      
      list = shuffleArray(OPEN_QUESTIONS);
      document.getElementById("qtotal").textContent = list.length;
      render();
    }

    function render() {
      if (idx >= list.length) {
        finishSequence();
        return;
      }
      
      currentOpenQ = list[idx];
      document.getElementById("qnum").textContent = (idx + 1);
      document.getElementById("progressBar").style.width = ((idx / list.length) * 100) + "%";

      document.getElementById("topicSubtitle").textContent = currentOpenQ.topic;
      document.getElementById("questionText").textContent = currentOpenQ.question;
      
      // Reset Answer Area
      document.getElementById("openAnswerInput").value = "";
      document.getElementById("idealAnswerBox").style.display = "none";
      document.getElementById("showAnswerBtn").style.display = "block";
    }

    function showOpenAnswer() {
      if (!currentOpenQ) return;
      document.getElementById("showAnswerBtn").style.display = "none";
      document.getElementById("idealAnswerBox").style.display = "block";
      document.getElementById("idealAnswerText").textContent = currentOpenQ.idealAnswer;
    }

    function gradeOpenAnswer(isUserCorrect) {
      if (isUserCorrect) {
        civics_stats.openCorrect++;
        correct++;
        playCorrect();
      } else {
        civics_stats.openWrong++;
        wrong++;
        playWrong();
      }
      saveSets();
      
      document.getElementById("correct").textContent = correct;
      document.getElementById("wrong").textContent = wrong;
      
      setTimeout(function () { 
        idx++; 
        render(); 
      }, 700);
    }

    function finishSequence() {
      document.getElementById("openQuestionArea").style.display = "none";
      document.getElementById("questionText").style.display = "none";
      document.getElementById("topicSubtitle").style.display = "none";
      
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("finishBox").style.display = "block";
      
      var MathMax = Math.max(1, list.length);
      var percent = Math.round((correct / MathMax) * 100);
      document.getElementById("finishStats").innerHTML = 'ציון הצלחה יחסי: <b>' + percent + '%</b> <br><br> נכון: ' + correct + ' מתוך ' + list.length;
    }

    window.onload = initPage;
  </script>
</body>
</html>
