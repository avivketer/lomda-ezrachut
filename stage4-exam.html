<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>שלב 4: מבחן מסכם (70 שאלות)</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <div class="container">
    <div class="topbar" style="margin-bottom: 20px;">
      <a href="index.html" class="icon-btn" style="background:#f1f5f9; font-weight:bold;">🏠 חזור למסך הראשי</a>
      <button class="icon-btn" onclick="toggleMute()" id="muteBtn" title="השתקת סאונד">🔊</button>
      <button class="icon-btn" onclick="openStats()" title="סטטיסטיקה">📊 סטטיסטיקה</button>
    </div>

    <h1 style="color:#0ea5e9;">שלב 4: מבחן מסכם</h1>

    <div class="topbar">
      <div class="pill" style="background:#0ea5e9; color:#fff;">מבחן (70 שאלות)</div>
      <div class="pill" style="background:#fef3c7; color:#b45309;">מעבר: מעל 90%</div>
      <div class="pill gray">שאלה <span id="qnum">1</span> / <span id="qtotal">70</span></div>
    </div>

    <div class="progress">
      <div class="progress-inner" id="progressBar" style="background: linear-gradient(90deg, #0ea5e9, #3b82f6);"></div>
    </div>

    <div id="questionArea">
      <div class="topic-subtitle" id="topicSubtitle"></div>
      <div id="questionText">חילץ נתונים...</div>
      <div id="answersArea"></div>
    </div>
  </div>

  <!-- Stats Modal -->
  <div class="modal-overlay" id="statsModal">
    <div class="modal">
      <button class="close-modal" aria-label="סגור" onclick="closeModal('statsModal')">&times;</button>
      <h2>סטטיסטיקת המשתמש</h2>
      <div id="statsContent"></div>
      <div style="margin-top: 20px; text-align:center;">
        <button class="primary" style="padding: 10px 20px; border-radius: 8px; border: none; cursor:pointer;"
          onclick="closeModal('statsModal')">סגור</button>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="js/app.js"></script>
  <script>
    var list = [];
    var idx = 0;
    var correct = 0;
    var wrong = 0;

    function startExam() {
      list = shuffleArray(QUESTIONS).slice(0, 70);
      idx = 0; correct = 0; wrong = 0;
      
      document.getElementById("qtotal").textContent = list.length;
      document.getElementById("questionArea").style.display = "block";
      render();
    }

    function render() {
      if (idx >= list.length) {
        finishSequence();
        return;
      }
      var q = list[idx];
      document.getElementById("qnum").textContent = (idx + 1);
      document.getElementById("progressBar").style.width = ((idx / list.length) * 100) + "%";

      document.getElementById("questionText").textContent = q.question;
      document.getElementById("topicSubtitle").textContent = q.topic || "";
      
      var answersArea = document.getElementById("answersArea");
      answersArea.innerHTML = "";
      
      var built = q.answers.map(function (t, i) { return { text: t, isCorrect: i === q.correctIndex }; });
      var shown = shuffleArray(built);
      
      shown.forEach(function (opt, vIdx) {
        var btn = document.createElement("button");
        btn.className = "answer-btn";
        btn.innerHTML = "<span>" + String.fromCharCode(1488 + vIdx) + ". " + opt.text + "</span><span></span>";
        btn.onclick = function () { choose(btn, opt.isCorrect, shown, q); };
        answersArea.appendChild(btn);
      });
    }

    function choose(btn, isCorrect, shown, q) {
      var buttons = Array.from(document.querySelectorAll(".answer-btn"));
      if (buttons.some(function (b) { return b.classList.contains("correct") || b.classList.contains("wrong"); })) return;

      if (isCorrect) {
        btn.classList.add("correct");
        correct++;
        successes.add(q.id);
        mistakes.delete(q.id);
        playCorrect();
      } else {
        btn.classList.add("wrong");
        wrong++;
        mistakes.add(q.id);
        playWrong();
        buttons.forEach(function (b, i) {
          if (shown[i].isCorrect) b.classList.add("correct");
        });
      }
      saveSets();
      
      setTimeout(function () { idx++; render(); }, 800);
    }

    function finishSequence() {
      var MathMax = Math.max(1, list.length);
      var percent = Math.round((correct / MathMax) * 100);
      
      document.getElementById("questionText").innerHTML = "סיום המבחן 🎉";
      document.getElementById("progressBar").style.width = "100%";
      document.getElementById("topicSubtitle").style.display = "none";

      var ansArea = document.getElementById("answersArea");
      if (percent >= 90) {
        civics_stats.examsPassed++;
        saveSets();
        
        ansArea.innerHTML = '<div class="small" style="font-size:22px; color:#16a34a; text-align:center;"><b>מבחן עובר! ציון: ' + percent + '%</b><br><br>כל הכבוד! עברת ' + civics_stats.examsPassed + ' מבחנים עד כה.</div>';
        
        if (civics_stats.examsPassed === 3) {
          ansArea.innerHTML += '<div style="margin-top:25px; text-align:center; padding:15px; background:#fef3c7; font-weight:bold; color:#b45309; border-radius:12px; font-size:20px;">🎉 שלב 2 (שאלות פתוחות) הופעל בהצלחה! חזרו למסך הבית כדי להתחיל. 🎉</div>';
        }
      } else {
        ansArea.innerHTML = '<div class="small" style="font-size:22px; color:#dc2626; text-align:center;"><b>נכשלת במבחן. ציון: ' + percent + '%</b><br><br>נדרש 90% לפחות כדי לעבור. חזרו לתרגול ונסו שוב.</div>';
      }
      
      ansArea.innerHTML += '<div style="text-align:center;"><a href="index.html" class="primary" style="display:inline-block; margin-top:25px; padding:12px 24px; border-radius:10px; text-decoration:none;">חזור למסך הראשי</a></div>';
    }

    window.onload = function () {
      startExam();
    };
  </script>
</body>
</html>
